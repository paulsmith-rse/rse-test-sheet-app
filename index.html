const certs=["Minor Works Certificate","Electrical Installation Certificate","EICR Certificate","Emergency Lighting Certificate","Emergency Lighting Test Sheet","EICR Remedial Evidence","No certificate required","To be confirmed"];
let S={screen:"loading",engineer:localStorage.rse_engineer||"Dan",tab:"open",search:"",id:null,jobs:[]};
async function loadJobs(){
  try{
    const r=await fetch("/jobs.json?v="+Date.now(),{cache:"no-store"});
    if(!r.ok) throw new Error("jobs.json not found");
    const data=await r.json();
    S.jobs=Array.isArray(data)?data:data.jobs||[];
    S.screen="login";
  }catch(e){
    S.jobs=[];
    S.screen="login";
    S.loadError="Could not load jobs.json. Check it was uploaded with the app.";
  }
  render();
}
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}
function attr(s){return String(s??"").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function isOpen(j){return !["Cleared","Not required"].includes(j.status)}
function cls(s){s=(s||"").toLowerCase();if(s.includes("awaiting test"))return"awaiting";if(s.includes("decision"))return"decision";if(s.includes("uploaded"))return"review";if(s.includes("correction"))return"correction";if(s.includes("cleared"))return"cleared";return"decision"}
function nav(a){return `<div class=nav><button class="${a=='jobs'?'active':''}" onclick="S.tab='open';go('jobs')">Open Jobs</button><button class="${a=='review'?'active':''}" onclick="S.tab='review';go('jobs')">Review</button><button class="${a=='admin'?'active':''}" onclick="go('admin')">Admin</button></div>`}
function go(x){S.screen=x;render()}
function logoBar(){return `<div class=logoBar><img src="${logoData}" alt="RS Electrical Engineering"></div>`}
function header(){let o=S.jobs.filter(isOpen).length,r=S.jobs.filter(j=>j.status=="Uploaded - awaiting review").length,c=S.jobs.filter(j=>j.status=="Cleared").length;return `${logoBar()}<div class=hero><h1>Test Sheet Uploads</h1><p>${esc(S.engineer)} signed in</p><div class=stats><div class=stat><strong>${o}</strong><span>Open</span></div><div class=stat><strong>${r}</strong><span>Review</span></div><div class=stat><strong>${c}</strong><span>Cleared</span></div></div></div>`}
function login(){localStorage.rse_engineer=S.engineer;go("jobs")}
function loginPage(){return `<div class=wrap>${logoBar()}<div class=card><h1 style="margin-top:0">RSE Test Sheets</h1><p class=tiny>Live jobs feed version. Jobs are loaded from jobs.json.</p>${S.loadError?`<div class=notice>${esc(S.loadError)}</div>`:""}<label>Engineer name</label><select class=field onchange="S.engineer=this.value">${["Dan","Callum","Ben","Will","Other"].map(n=>`<option ${S.engineer==n?"selected":""}>${n}</option>`).join("")}</select><label>Site PIN</label><input class=field placeholder="Example: 1234"><button class=btn onclick=login()>Open App</button></div></div>`}
function filtered(){let q=S.search.toLowerCase();return S.jobs.filter(j=>{let t=[j.quoteRef,j.client,j.site,j.description,j.engineer,j.certRequired].join(" ").toLowerCase();let ok=!q||t.includes(q);if(S.tab=="open")return ok&&isOpen(j);if(S.tab=="review")return ok&&j.status=="Uploaded - awaiting review";return ok})}
function card(j){return `<button class=job onclick="selectJob('${esc(j.id||j.quoteRef)}')"><div class=jobtop><div><div class=quote>${esc(j.quoteRef)}</div><div class=site>${esc(j.site)}</div></div><span class="pill ${cls(j.status)}">${esc(j.status)}</span></div><div class=desc>${esc(j.description)}</div><div class=cert><small>Certificate required by office</small><strong>${esc(j.certRequired)}</strong></div></button>`}
function jobsPage(){let js=filtered();return `<div class=wrap>${header()}<div class=search><input class=field placeholder="Search quote, site or client" value="${esc(S.search)}" oninput="S.search=this.value;render()"></div><div class=tabs><button class="tab ${S.tab=='open'?'active':''}" onclick="S.tab='open';render()">Open</button><button class="tab ${S.tab=='review'?'active':''}" onclick="S.tab='review';render()">Review</button><button class="tab ${S.tab=='all'?'active':''}" onclick="S.tab='all';render()">All</button></div>${js.length?js.map(card).join(""):"<div class='card empty'>No jobs showing.</div>"}${nav(S.tab=="review"?"review":"jobs")}</div>`}
function selectJob(id){S.id=id;go("detail")}
function getJob(){return S.jobs.find(x=>(x.id||x.quoteRef)==S.id)}
function updateFileLabel(n,input){let label=document.getElementById("fileLabel"+n);label.textContent=input.files && input.files[0] ? "Selected: " + input.files[0].name : "";}
function submitRealForm(){let f=document.getElementById("realSubmitForm");let fileNames=[];if(f.certFile1.files[0])fileNames.push(f.certFile1.files[0].name);if(f.certFile2.files[0])fileNames.push(f.certFile2.files[0].name);if(f.certFile3.files[0])fileNames.push(f.certFile3.files[0].name);if(fileNames.length===0){let n=document.getElementById("submitNotice");n.className="notice";n.textContent="Please attach at least one photo or PDF before submitting.";return}let n=document.getElementById("submitNotice");n.className="success";n.textContent="Submitting to Netlify Forms...";setTimeout(()=>f.submit(),300)}
function detailPage(){let j=getJob();if(!j)return jobsPage();let completed=j.completedCertType||j.certRequired;return `<div class=wrap><div class=back><button onclick="go('jobs')">‹</button><div><h2>${esc(j.quoteRef)}</h2><div class=tiny>${esc(j.site)}</div></div></div>${j.status=="Needs correction"?`<div class=alert><strong>Correction needed:</strong><br>${esc(j.correctionNotes)}</div>`:""}<div class=card><div class=jobtop><div><div class=quote>${esc(j.quoteRef)}</div><div class=site>${esc(j.client)}</div></div><span class="pill ${cls(j.status)}">${esc(j.status)}</span></div><div class=detail><small>Job description</small><span>${esc(j.description)}</span></div><div class=detail><small>Testing applicable</small><span>${esc(j.testingApplicable)}</span></div><div class=detail><small>Certificate required by office</small><span>${esc(j.certRequired)}</span></div><div class=detail><small>Responsible engineer</small><span>${esc(j.engineer)}</span></div></div><form id=realSubmitForm name="rse-cert-upload" method="POST" data-netlify="true" netlify enctype="multipart/form-data" action="/thanks.html"><input type=hidden name=form-name value="rse-cert-upload"><input type=hidden name=quoteRef value="${attr(j.quoteRef)}"><input type=hidden name=client value="${attr(j.client)}"><input type=hidden name=site value="${attr(j.site)}"><input type=hidden name=engineer value="${attr(S.engineer)}"><input type=hidden name=certificateRequired value="${attr(j.certRequired)}"><div class=card><h2 style="margin-top:0">Upload certificate</h2><label>Certificate completed on site</label><select class=field name=certificateCompleted>${certs.map(c=>`<option ${completed==c?"selected":""}>${esc(c)}</option>`).join("")}</select><label>Certificate reference</label><input class=field name=certificateRef placeholder="Example: MWC-11644"><label>Comments for office</label><textarea class=field name=comments placeholder="Example: Additional socket added on site."></textarea><div class=upload><div style="font-size:34px">📷</div><strong>Upload photos or PDF</strong><div class=tiny>Supports up to 3 files.</div></div><div class=fileInput><label>File 1</label><input name=certFile1 type=file accept="image/*,.pdf" onchange="updateFileLabel(1,this)"><div id=fileLabel1 class=selectedFile></div></div><div class=fileInput><label>File 2</label><input name=certFile2 type=file accept="image/*,.pdf" onchange="updateFileLabel(2,this)"><div id=fileLabel2 class=selectedFile></div></div><div class=fileInput><label>File 3</label><input name=certFile3 type=file accept="image/*,.pdf" onchange="updateFileLabel(3,this)"><div id=fileLabel3 class=selectedFile></div></div><div id=submitNotice></div><button type=button class=btn onclick=submitRealForm()>Submit for Review</button></div></form>${nav("jobs")}</div>`}
function adminPage(){return `<div class=wrap>${header()}<div class=card><h2 style="margin-top:0">Office Review</h2><p class=tiny>Real submissions are now in Netlify Forms. This app screen is only a quick local view.</p></div>${nav("admin")}</div>`}
function render(){let a=document.getElementById("app");if(S.screen=="loading")a.innerHTML="<div class=wrap><div class=card>Loading jobs...</div></div>";if(S.screen=="login")a.innerHTML=loginPage();if(S.screen=="jobs")a.innerHTML=jobsPage();if(S.screen=="detail")a.innerHTML=detailPage();if(S.screen=="admin")a.innerHTML=adminPage()}
render();loadJobs();
</script>
</body></html>

<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#111827">
<title>RS Electrical Engineering - Test Sheet Uploads</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:#eef2f7;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,Helvetica,sans-serif;color:#111827;-webkit-text-size-adjust:100%}
  .wrap{max-width:560px;margin:0 auto;padding:16px 16px calc(28px + env(safe-area-inset-bottom))}
  .logoBar{background:#fff;border-radius:22px;padding:16px;margin-bottom:14px;box-shadow:0 8px 22px #0f172a14;display:flex;align-items:center;justify-content:center}
  .logoBar img{max-width:230px;width:80%;height:auto;display:block}
  .hero{background:#111827;color:#fff;border-radius:28px;padding:20px;margin-bottom:16px;box-shadow:0 10px 30px #0003}
  .hero h1{margin:0;font-size:23px;line-height:1.2}
  .hero p{margin:6px 0 0;color:#cbd5e1;font-size:14px}
  .card{background:#fff;border:0;border-radius:24px;padding:18px;margin-bottom:14px;box-shadow:0 8px 22px #0f172a14}
  label{font-weight:800;font-size:14px;display:block;margin-bottom:8px;color:#1f2937}
  .field{width:100%;border:1px solid #e5e7eb;border-radius:16px;padding:15px 14px;font-size:16px;margin:0 0 16px;background:#fff;-webkit-appearance:none}
  .field:focus{outline:none;border-color:#111827;box-shadow:0 0 0 3px #11182722}
  textarea.field{min-height:104px;resize:vertical}
  .btn{width:100%;border:0;border-radius:16px;padding:16px;background:#111827;color:#fff;font-weight:900;font-size:17px;min-height:56px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  .btn:active{transform:translateY(1px)}
  .btn[disabled]{opacity:.45;cursor:not-allowed}
  .btn.green{background:#16a34a}
  .btn.secondary{background:#e5e7eb;color:#111827}
  .job{width:100%;text-align:left}
  .jobtop{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
  .quote{font-size:21px;font-weight:900}
  .client{font-weight:800;color:#1f2937;margin-top:2px}
  .site{font-weight:700;color:#475569;margin-top:2px;font-size:14px}
  .desc{font-size:14px;color:#64748b;margin-top:10px;line-height:1.4}
  .pill{border-radius:999px;padding:7px 12px;font-size:12px;font-weight:900;white-space:nowrap;background:#fee2e2;color:#991b1b;flex:none}
  .detailGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
  .detail{background:#f8fafc;border-radius:14px;padding:11px}
  .detail.full{grid-column:1 / -1}
  .detail small{display:block;text-transform:uppercase;color:#64748b;font-size:11px;font-weight:900;letter-spacing:.02em}
  .detail span{display:block;margin-top:4px;font-weight:800;font-size:14px;word-break:break-word}
  .back{display:flex;gap:12px;align-items:center;margin-bottom:14px}
  .back button{width:50px;height:50px;border:0;border-radius:18px;background:#fff;font-size:24px;box-shadow:0 8px 20px #0f172a14;cursor:pointer}
  .upload{border:2px dashed #cbd5e1;background:#f8fafc;border-radius:20px;padding:20px;text-align:center;margin-bottom:14px}
  .upload p{margin:0 0 12px;color:#64748b;font-size:14px;font-weight:700}
  .filelist{margin:6px 0 0;padding:0;list-style:none}
  .filelist li{display:flex;justify-content:space-between;align-items:center;gap:8px;background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:10px 12px;margin-top:8px;font-size:13px;font-weight:700;text-align:left}
  .filelist li span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .filelist li button{border:0;background:#fee2e2;color:#991b1b;border-radius:10px;font-weight:900;padding:6px 10px;cursor:pointer;flex:none}
  .notice{background:#fef3c7;color:#92400e;border-radius:16px;padding:13px;margin-bottom:12px;font-weight:800;font-size:14px}
  .success{background:#dcfce7;color:#166534;border-radius:18px;padding:18px;margin-bottom:14px;font-weight:900;text-align:center;font-size:16px;line-height:1.4}
  .error{background:#fee2e2;color:#991b1b;border-radius:16px;padding:13px;margin-bottom:12px;font-weight:800;font-size:14px}
  .empty{text-align:center;color:#64748b;padding:34px 12px;font-weight:700}
  .count{font-size:13px;color:#64748b;font-weight:800;margin:0 0 12px}
  .tiny{font-size:12px;color:#94a3b8;line-height:1.5;margin-top:16px;text-align:center}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
/* =========================================================================
   RSE Test Sheet Uploads
   Mobile testing-upload portal for RS Electrical Engineering.
   Final storage: Microsoft 365 / SharePoint via Power Automate.
   ========================================================================= */

/* -------------------------------------------------------------------------
   POWER AUTOMATE WEBHOOK
   Paste the "When a HTTP request is received" URL from the Power Automate
   flow here. While this is left blank the app runs in DEMO MODE: it shows a
   demo success message and logs the submission payload to the browser
   console instead of sending it anywhere.
   ------------------------------------------------------------------------- */
const POWER_AUTOMATE_UPLOAD_WEBHOOK_URL = "";

/* -------------------------------------------------------------------------
   ACCESS PIN
   One shared site PIN for all engineers. The engineer must enter their name
   and this PIN to enter the app. Update the value here to change the PIN.
   ------------------------------------------------------------------------- */
const APP_SITE_PIN = "1981";

/* SharePoint upload base path. Power Automate creates a folder per list item
   named after the Quote/Job No (the list Title), and writes the full path
   back into the "Submission Folder Path" column. */
const UPLOAD_BASE_PATH = "General/App Data/Testing Uploads";

const MAX_FILES = 7;
const ACCEPTED_TYPES = ["image/", "application/pdf"];

/* -------------------------------------------------------------------------
   DEMO JOB DATA
   Stand-in for the live "RSE Test Register-Live" Microsoft List feed.
   Replace this with the Power Automate job-feed URL when available.
   Fields mirror the live list columns. Only jobs with
   testingApplicable === "Yes" AND testStatus === "Testing Required"
   are shown on the job selection screen.
   ------------------------------------------------------------------------- */
const DEMO_JOBS = [
  {
    listItemId: 101,
    quoteJobNo: "Q11270",
    client: "ALLCONTROLS LTD",
    site: "Allcontrols - Enviroo",
    jobDescription: "Control panel and electrical install to pet sorting plant.",
    certificateRequired: "Electrical Installation Certificate (EIC)",
    testStatus: "Testing Required",
    testingApplicable: "Yes",
    submissionFolderPath: UPLOAD_BASE_PATH + "/Q11270"
  },
  {
    listItemId: 102,
    quoteJobNo: "Q11316",
    client: "GREENCORE SPALDING",
    site: "Greencore - Spalding",
    jobDescription: "Annual service testing & compliance 2026.",
    certificateRequired: "Electrical Installation Condition Report (EICR)",
    testStatus: "Testing Required",
    testingApplicable: "Yes",
    submissionFolderPath: UPLOAD_BASE_PATH + "/Q11316"
  },
  {
    listItemId: 103,
    quoteJobNo: "Q11402",
    client: "BAKKAVOR DESSERTS",
    site: "Bakkavor - Newark",
    jobDescription: "New distribution board and final circuits to chilled store.",
    certificateRequired: "Emergency Lighting Test Sheet",
    testStatus: "Testing Required",
    testingApplicable: "Yes",
    submissionFolderPath: UPLOAD_BASE_PATH + "/Q11402"
  },
  {
    listItemId: 104,
    quoteJobNo: "Q11458",
    client: "MOY PARK",
    site: "Moy Park - Anwick",
    jobDescription: "Power supply and isolation to new packing line.",
    certificateRequired: "Minor Electrical Installation Works Certificate",
    testStatus: "Testing Required",
    testingApplicable: "Yes",
    submissionFolderPath: UPLOAD_BASE_PATH + "/Q11458"
  },
  /* Filtered out below: testing not applicable */
  {
    listItemId: 105,
    quoteJobNo: "Q11500",
    client: "RS Electrical Engineering",
    site: "Workshop",
    jobDescription: "Internal lighting upgrade - no testing required.",
    certificateRequired: "N/A",
    testStatus: "Not Required",
    testingApplicable: "No",
    submissionFolderPath: UPLOAD_BASE_PATH + "/Q11500"
  },
  /* Filtered out below: already cleared */
  {
    listItemId: 106,
    quoteJobNo: "Q11510",
    client: "GREENCORE SPALDING",
    site: "Greencore - Spalding",
    jobDescription: "Removal of cheese machine and supply to new grater.",
    certificateRequired: "Minor Works Certificate",
    testStatus: "Cleared",
    testingApplicable: "Yes",
    submissionFolderPath: UPLOAD_BASE_PATH + "/Q11510"
  }
];

/* -------------------------------------------------------------------------
   APP STATE
   ------------------------------------------------------------------------- */
const state = {
  screen: "login",      // login | jobs | upload
  engineer: "",
  job: null,            // selected job object
  files: [],            // selected File objects for the current upload
  message: null         // { type: "success"|"error"|"notice", text }
};

const app = document.getElementById("app");
const esc = s => String(s == null ? "" : s).replace(/[&<>"']/g, c =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

function logoBar() {
  return '<div class="logoBar"><img src="logo.png" alt="RS Electrical Engineering"></div>';
}

/* -------------------------------------------------------------------------
   SCREEN: LOGIN
   ------------------------------------------------------------------------- */
function renderLogin() {
  app.innerHTML =
    logoBar() +
    '<div class="hero"><h1>Test Sheet Uploads</h1>' +
    '<p>Upload your testing certificates and test sheets from site.</p></div>' +
    '<div class="card">' +
      '<label for="engineer">Engineer name</label>' +
      '<input class="field" id="engineer" type="text" autocomplete="name" placeholder="e.g. Paul Smith" value="' + esc(state.engineer) + '">' +
      '<label for="pin">Site PIN</label>' +
      '<input class="field" id="pin" type="tel" inputmode="numeric" autocomplete="off" placeholder="Enter site PIN">' +
      '<div id="loginErr"></div>' +
      '<button class="btn" id="openBtn">Open app</button>' +
    '</div>' +
    '<p class="tiny">RS Electrical Engineering Ltd &middot; Testing upload portal</p>';

  document.getElementById("openBtn").addEventListener("click", doLogin);
  app.querySelectorAll(".field").forEach(el =>
    el.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); }));
}

function doLogin() {
  const name = document.getElementById("engineer").value.trim();
  const pin = document.getElementById("pin").value.trim();
  const errBox = document.getElementById("loginErr");
  if (!name) { errBox.innerHTML = '<div class="error">Please enter your engineer name.</div>'; return; }
  if (!pin) { errBox.innerHTML = '<div class="error">Please enter the site PIN.</div>'; return; }
  if (pin !== APP_SITE_PIN) { errBox.innerHTML = '<div class="error">Incorrect PIN. Please try again.</div>'; return; }
  state.engineer = name;
  state.screen = "jobs";
  state.message = null;
  render();
}

/* -------------------------------------------------------------------------
   SCREEN: JOB SELECTION
   ------------------------------------------------------------------------- */
function visibleJobs() {
  return DEMO_JOBS.filter(j =>
    String(j.testingApplicable).toLowerCase() === "yes" &&
    j.testStatus === "Testing Required");
}

function renderJobs() {
  const jobs = visibleJobs();
  let cards;
  if (!jobs.length) {
    cards = '<div class="empty">No jobs currently require test sheet uploads.</div>';
  } else {
    cards = jobs.map((j, i) =>
      '<div class="card job">' +
        '<div class="jobtop">' +
          '<div><div class="quote">' + esc(j.quoteJobNo) + '</div>' +
          '<div class="client">' + esc(j.client) + '</div>' +
          '<div class="site">' + esc(j.site) + '</div></div>' +
          '<div class="pill">' + esc(j.testStatus) + '</div>' +
        '</div>' +
        '<div class="desc">' + esc(j.jobDescription) + '</div>' +
        '<div class="detailGrid">' +
          '<div class="detail"><small>Certificate Required</small><span>' + esc(j.certificateRequired) + '</span></div>' +
          '<div class="detail"><small>Test Status</small><span>' + esc(j.testStatus) + '</span></div>' +
          '<div class="detail full"><small>Submission Folder Path</small><span>' + esc(j.submissionFolderPath) + '</span></div>' +
        '</div>' +
        '<button class="btn green" data-job="' + i + '" style="margin-top:14px">Upload Test Sheets</button>' +
      '</div>').join("");
  }

  app.innerHTML =
    logoBar() +
    '<div class="hero"><h1>Jobs requiring uploads</h1>' +
    '<p>' + esc(state.engineer) + ' signed in</p></div>' +
    '<p class="count">' + jobs.length + ' job' + (jobs.length === 1 ? "" : "s") + ' awaiting test sheets</p>' +
    cards +
    '<button class="btn secondary" id="signout" style="margin-top:6px">Sign out</button>';

  app.querySelectorAll("[data-job]").forEach(btn =>
    btn.addEventListener("click", () => openUpload(jobs[+btn.dataset.job])));
  document.getElementById("signout").addEventListener("click", () => {
    state.screen = "login"; state.job = null; state.files = []; state.message = null; render();
  });
}

function openUpload(job) {
  state.job = job;
  state.files = [];
  state.message = null;
  state.screen = "upload";
  render();
}

/* -------------------------------------------------------------------------
   SCREEN: UPLOAD
   ------------------------------------------------------------------------- */
function renderUpload() {
  const j = state.job;
  app.innerHTML =
    '<div class="back"><button id="backBtn" aria-label="Back">&#8592;</button>' +
    '<strong style="font-size:18px">Upload Test Sheets</strong></div>' +
    '<div class="card">' +
      '<div class="quote">' + esc(j.quoteJobNo) + '</div>' +
      '<div class="client">' + esc(j.client) + '</div>' +
      '<div class="site">' + esc(j.site) + '</div>' +
      '<div class="desc">' + esc(j.jobDescription) + '</div>' +
      '<div class="detailGrid">' +
        '<div class="detail"><small>Certificate Required</small><span>' + esc(j.certificateRequired) + '</span></div>' +
        '<div class="detail"><small>Engineer</small><span>' + esc(state.engineer) + '</span></div>' +
        '<div class="detail full"><small>Submission Folder Path</small><span>' + esc(j.submissionFolderPath) + '</span></div>' +
      '</div>' +
    '</div>' +
    '<div id="msg"></div>' +
    '<div class="card">' +
      '<label>Test sheets &amp; certificates</label>' +
      '<div class="upload">' +
        '<p>Add up to ' + MAX_FILES + ' photos or PDFs.<br>You can select more than one at a time.<br><strong>Maximum ' + MAX_FILES + ' files per submission.</strong></p>' +
        '<input id="fileInput" type="file" accept="image/*,application/pdf" multiple ' +
          'style="width:100%;background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:12px;font-size:15px">' +
        '<ul class="filelist" id="filelist"></ul>' +
      '</div>' +
      '<label for="notes">Engineer notes</label>' +
      '<textarea class="field" id="notes" placeholder="Add any notes about this testing (optional)"></textarea>' +
      '<button class="btn green" id="submitBtn">Submit upload</button>' +
    '</div>';

  document.getElementById("backBtn").addEventListener("click", () => {
    state.screen = "jobs"; state.job = null; state.files = []; state.message = null; render();
  });
  document.getElementById("fileInput").addEventListener("change", onFilesPicked);
  document.getElementById("submitBtn").addEventListener("click", onSubmit);
  renderMessage();
  renderFileList();
}

function isAccepted(file) {
  return ACCEPTED_TYPES.some(t => (file.type || "").startsWith(t));
}

function onFilesPicked(e) {
  const picked = Array.from(e.target.files || []);
  e.target.value = ""; // allow re-selecting the same file later

  const rejected = picked.filter(f => !isAccepted(f));
  const accepted = picked.filter(isAccepted);

  // de-duplicate by name + size
  const key = f => f.name + ":" + f.size;
  const existing = new Set(state.files.map(key));
  for (const f of accepted) if (!existing.has(key(f))) { state.files.push(f); existing.add(key(f)); }

  let overflow = false;
  if (state.files.length > MAX_FILES) { state.files = state.files.slice(0, MAX_FILES); overflow = true; }

  if (rejected.length) {
    setMessage("error", "Only images and PDFs are allowed. " + rejected.length + " file(s) skipped.");
  } else if (overflow) {
    setMessage("notice", "You can upload a maximum of " + MAX_FILES + " files. Extra files were not added.");
  } else {
    clearMessage();
  }
  renderFileList();
}

function renderFileList() {
  const ul = document.getElementById("filelist");
  if (!ul) return;
  if (!state.files.length) { ul.innerHTML = ""; return; }
  ul.innerHTML = state.files.map((f, i) =>
    '<li><span>' + esc(f.name) + '</span><button data-rm="' + i + '">Remove</button></li>').join("");
  ul.querySelectorAll("[data-rm]").forEach(b =>
    b.addEventListener("click", () => { state.files.splice(+b.dataset.rm, 1); clearMessage(); renderFileList(); }));
}

/* Read a File as base64 (no data: prefix) for the JSON payload. */
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(String(r.result).split(",")[1] || "");
    r.onerror = () => reject(new Error("Could not read " + file.name));
    r.readAsDataURL(file);
  });
}

async function onSubmit() {
  if (state.files.length === 0) { setMessage("error", "Please add at least one file before submitting."); renderMessage(); return; }
  if (state.files.length > MAX_FILES) { setMessage("error", "Please upload no more than " + MAX_FILES + " files."); renderMessage(); return; }

  const btn = document.getElementById("submitBtn");
  btn.disabled = true; btn.textContent = "Submitting…";
  setMessage("notice", "Uploading " + state.files.length + " file(s)…"); renderMessage();

  const j = state.job;
  let payload;
  try {
    const files = await Promise.all(state.files.map(async f => ({
      fileName: f.name,
      contentType: f.type,
      contentBytes: await fileToBase64(f)   // base64; Power Automate: base64ToBinary()
    })));

    payload = {
      quoteJobNo: j.quoteJobNo,
      listItemId: j.listItemId,
      client: j.client,
      site: j.site,
      jobDescription: j.jobDescription,
      certificateRequired: j.certificateRequired,
      engineerName: state.engineer,
      engineerNotes: (document.getElementById("notes").value || "").trim(),
      submissionFolderPath: j.submissionFolderPath,
      files: files,
      fileCount: files.length,
      submittedDateTime: new Date().toISOString()
    };
  } catch (err) {
    btn.disabled = false; btn.textContent = "Submit upload";
    setMessage("error", "Could not read your files. Please try again."); renderMessage();
    return;
  }

  // DEMO MODE: no webhook configured yet.
  if (!POWER_AUTOMATE_UPLOAD_WEBHOOK_URL) {
    console.log("[RSE Upload] DEMO MODE - submission payload (not sent):", payload);
    showSuccess(true);
    return;
  }

  try {
    const res = await fetch(POWER_AUTOMATE_UPLOAD_WEBHOOK_URL, {
      method: "POST",
      // text/plain avoids a CORS pre-flight against the Power Automate trigger;
      // the body is still JSON and parses normally inside the flow.
      headers: { "Content-Type": "text/plain;charset=UTF-8" },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error("Server returned " + res.status);
    showSuccess(false);
  } catch (err) {
    console.error("[RSE Upload] submission failed:", err);
    btn.disabled = false; btn.textContent = "Submit upload";
    setMessage("error", "Upload failed. Please check your signal and try again."); renderMessage();
  }
}

function showSuccess(demo) {
  const j = state.job;
  app.innerHTML =
    logoBar() +
    '<div class="success">' +
      (demo ? "Demo upload complete." : "Upload submitted successfully.") + '<br>' +
      state.files.length + ' file(s) ' + (demo ? "logged" : "sent") + ' for ' + esc(j.quoteJobNo) + '.' +
      (demo ? '<br><span style="font-weight:700;font-size:13px">Demo mode &mdash; payload logged to the browser console.</span>' : '') +
    '</div>' +
    '<div class="card">' +
      '<div class="detailGrid">' +
        '<div class="detail"><small>Quote/Job No</small><span>' + esc(j.quoteJobNo) + '</span></div>' +
        '<div class="detail"><small>Files</small><span>' + state.files.length + '</span></div>' +
        '<div class="detail full"><small>Submission Folder Path</small><span>' + esc(j.submissionFolderPath) + '</span></div>' +
      '</div>' +
    '</div>' +
    '<button class="btn" id="backJobs">Back to jobs</button>';
  document.getElementById("backJobs").addEventListener("click", () => {
    state.screen = "jobs"; state.job = null; state.files = []; state.message = null; render();
  });
}

/* -------------------------------------------------------------------------
   MESSAGE HELPERS
   ------------------------------------------------------------------------- */
function setMessage(type, text) { state.message = { type, text }; }
function clearMessage() { state.message = null; renderMessage(); }
function renderMessage() {
  const box = document.getElementById("msg");
  if (!box) return;
  if (!state.message) { box.innerHTML = ""; return; }
  const cls = state.message.type === "success" ? "success" : state.message.type === "error" ? "error" : "notice";
  box.innerHTML = '<div class="' + cls + '">' + esc(state.message.text) + '</div>';
}

/* -------------------------------------------------------------------------
   ROUTER
   ------------------------------------------------------------------------- */
function render() {
  try {
    if (state.screen === "jobs") return renderJobs();
    if (state.screen === "upload") return renderUpload();
    return renderLogin();
  } catch (err) {
    console.error("[RSE Upload] render error:", err);
    app.innerHTML = '<div class="error">Something went wrong. Please reload the page.</div>';
  }
}

render();
</script>
</body>
</html>
